[phases.setup]
aptPkgs = ["python3", "python3-pip", "libgl1-mesa-glx", "libglib2.0-0"]

[phases.install]
cmds = [
  "python3 -m pip install 'rembg[cpu]' pillow --quiet --break-system-packages 2>&1 || pip3 install 'rembg[cpu]' pillow --quiet --break-system-packages 2>&1 || true",
  "npm ci"
]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "npm start"
